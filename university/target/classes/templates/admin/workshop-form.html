<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${pageTitle} + ' | U-WRS'">Workshop Form | U-WRS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand"><a th:href="@{/}">U-WRS</a></div>
    <div class="nav-links">
        <a th:href="@{/}">Home</a>
        <a th:href="@{/admin/workshops}">Admin</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-link">Logout</button>
        </form>
    </div>
</nav>

<main class="container">
    <div class="form-card">
        <h2 th:text="${pageTitle}">Workshop Form</h2>

        <form th:action="${formAction}" th:object="${workshopForm}" method="post" novalidate>
            <div class="form-group">
                <label for="title">Title <span class="required">*</span></label>
                <input type="text" id="title" th:field="*{title}" placeholder="Workshop title (5-80 chars)"/>
                <span class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" th:field="*{description}" rows="4"
                          placeholder="Workshop description..."></textarea>
            </div>

            <div class="form-group">
                <label for="location">Location <span class="required">*</span></label>
                <input type="text" id="location" th:field="*{location}" placeholder="e.g. Main Campus Hall A"/>
                <span class="field-error" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></span>
            </div>

            <div class="form-group">
                <label for="startDatetime">Start Date &amp; Time <span class="required">*</span></label>
                <input type="datetime-local" id="startDatetime" th:field="*{startDatetime}"/>
                <span class="field-error" th:if="${#fields.hasErrors('startDatetime')}" th:errors="*{startDatetime}"></span>
            </div>

            <div class="form-group">
                <label for="totalSeats">Total Seats <span class="required">*</span></label>
                <input type="number" id="totalSeats" th:field="*{totalSeats}" min="1" placeholder="e.g. 30"/>
                <span class="field-error" th:if="${#fields.hasErrors('totalSeats')}" th:errors="*{totalSeats}"></span>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save Workshop</button>
                <a th:href="@{/admin/workshops}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
