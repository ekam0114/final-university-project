<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>My Registrations | U-WRS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand"><a th:href="@{/}">U-WRS</a></div>
    <div class="nav-links">
        <a th:href="@{/}">Home</a>
        <a th:href="@{/my/registrations}">My Registrations</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/workshops}">Admin</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-link">Logout</button>
        </form>
    </div>
</nav>

<main class="container">
    <h1>My Registrations</h1>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <div th:if="${#lists.isEmpty(registrations)}" class="empty-state">
        <p>You have no registrations yet. <a th:href="@{/}">Browse workshops</a> to get started.</p>
    </div>

    <table th:if="${!#lists.isEmpty(registrations)}" class="data-table">
        <thead>
        <tr>
            <th>Workshop</th>
            <th>Date &amp; Time</th>
            <th>Registered At</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${registrations}">
            <td><a th:href="@{/workshops/{id}(id=${r.workshopId})}" th:text="${r.workshopTitle}">Title</a></td>
            <td th:text="${#temporals.format(r.workshopStartDatetime, 'MMM dd, yyyy HH:mm')}">Date</td>
            <td th:text="${#temporals.format(r.createdAt, 'MMM dd, yyyy HH:mm')}">Created</td>
            <td>
                <span class="badge" th:text="${r.status}"
                      th:classappend="${r.status == 'ACTIVE'} ? 'badge-active' : 'badge-cancelled'">ACTIVE</span>
            </td>
            <td>
                <form th:if="${r.status == 'ACTIVE'}"
                      th:action="@{/registrations/{id}/cancel(id=${r.id})}" method="post"
                      style="display:inline">
                    <button type="submit" class="btn btn-sm btn-danger"
                            onclick="return confirm('Cancel this registration?')">Cancel</button>
                </form>
                <span th:if="${r.status == 'CANCELLED'}" class="text-muted">—</span>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
