<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Home | U-WRS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand"><a th:href="@{/}">U-WRS</a></div>
    <div class="nav-links">
        <a sec:authorize="isAuthenticated()" th:href="@{/my/registrations}">My Registrations</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/workshops}">Admin</a>
        <a sec:authorize="isAnonymous()" th:href="@{/login}">Login</a>
        <a sec:authorize="isAnonymous()" th:href="@{/register}">Register</a>
        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-link">Logout</button>
        </form>
    </div>
</nav>

<main class="container">
    <h1>Upcoming Workshops</h1>

    <div th:if="${#lists.isEmpty(workshops)}" class="empty-state">
        <p>No upcoming workshops available at this time. Check back soon!</p>
    </div>

    <div class="workshop-grid">
        <div class="workshop-card" th:each="w : ${workshops}">
            <div class="card-body">
                <h3 th:text="${w.title}">Workshop Title</h3>
                <p class="card-meta">
                    <span class="icon">📅</span>
                    <span th:text="${#temporals.format(w.startDatetime, 'MMM dd, yyyy HH:mm')}">Date</span>
                </p>
                <p class="card-meta">
                    <span class="icon">📍</span>
                    <span th:text="${w.location}">Location</span>
                </p>
                <p class="card-meta" th:classappend="${w.seatsRemaining == 0} ? 'sold-out'">
                    <span class="icon">🪑</span>
                    <span th:text="${w.seatsRemaining > 0 ? w.seatsRemaining + ' seats remaining' : 'SOLD OUT'}">Seats</span>
                </p>
                <a th:href="@{/workshops/{id}(id=${w.id})}" class="btn btn-primary">View Details</a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
