<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' | U-WRS'">U-WRS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:fragment="navbar">
    <div class="nav-brand"><a th:href="@{/}">U-WRS</a></div>
    <div class="nav-links">
        <a th:href="@{/}">Home</a>
        <a sec:authorize="isAuthenticated()" th:href="@{/my/registrations}">My Registrations</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/workshops}">Admin</a>
        <a sec:authorize="isAnonymous()" th:href="@{/login}">Login</a>
        <a sec:authorize="isAnonymous()" th:href="@{/register}">Register</a>
        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-link">Logout</button>
        </form>
    </div>
</nav>
</body>
</html>
